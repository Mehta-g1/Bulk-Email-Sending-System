{% extends "CreateUser/base.html" %}
{% load static %}

{% block title %}Edit Email Template{% endblock %}

{% block content %}



<div class="container-fluid py-2">

    <div class="card col-lg-8 p-4 shadow-lg mx-auto mt-3 mb-5"
        style="background:#171717;border:1px solid #333;color:#e2e8f0">
        <div class="heading d-flex justify-content-between mb-4 border-bottom pb-3">
            <h4 class="mb-0 fw-bold" style="color:#fff"><i class="fas fa-eye me-2 text-primary"></i>View Email Template
            </h4>
            <a href="{% url 'templates' %}" class="text-muted hover-light"> <i class="fa-solid fa-xmark fa-xl"></i> </a>
        </div>



        <!-- Template Info Grid -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label small fw-bold" style="color:#94a3b8">Template Name</label>
                <div class="p-2 rounded" style="background:#0f172a; border:1px solid #334155;">{{name}}</div>
            </div>
            <div class="col-md-6">
                <label class="form-label small fw-bold" style="color:#94a3b8">Subject</label>
                <div class="p-2 text-white rounded" style="background:#0f172a; border:1px solid #334155;">{{subject}}</div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label small fw-bold" style="color:#94a3b8">Template ID</label>
                <div class="p-2 rounded text-white" style="background:#0f172a; border:1px solid #334155;">#{{id}}</div>
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold" style="color:#94a3b8">Created</label>
                <div class="p-2 rounded text-white"
                    style="background:#0f172a; border:1px solid #334155; font-size:12px">{{created_at|date:"M d, Y H:i"}}
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold" style="color:#94a3b8">Last Updated</label>
                <div class="p-2 rounded text-white"
                    style="background:#0f172a; border:1px solid #334155; font-size:12px">{{updated_at|date:"M d, Y H:i"}}
                </div>
            </div>
        </div>

        <!-- Body -->
        <div class="mb-3">
            <label class="form-label fw-bold">Email Body (Preview)</label>
            <div class="form-control text-light" style="min-height: 200px; background: #2b3035; overflow-y: auto;">
                {{body|safe}}
            </div>
        </div>
        <div class='d-flex gap-2 mt-4'>
            <a href="{% url 'templates' %}" class="btn btn-outline-secondary px-4">
                <i class="fas fa-arrow-left me-2"></i>Back
            </a>
            <a href="{% url 'editTemplate' id %}" class="btn btn-primary px-4">
                <i class="fas fa-edit me-2"></i>Edit Template
            </a>
            <a href="{% url 'deleteTemplate' id %}" class="btn btn-danger px-4"
                onclick="return confirm('Are you sure you want to delete this template?');">
                <i class="fas fa-trash me-2"></i>Delete
            </a>
        </div>

    </div>
    {% endblock %}
